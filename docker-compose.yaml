services:
  db:
    image: postgres:17
    container_name: blog_db
    restart: unless-stopped
    volumes:
      - blog_db_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    env_file:
      - .env.docker
    healthcheck:
      test: ['CMD-SHELL', 'sh -c "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"']
      interval: 5s
      timeout: 3s
      retries: 3


  django:
    build: .
    container_name: blog
    command: make run_all
    restart: unless-stopped
    volumes:
      - ./src/django_project/media:/app/src/django_project/media
    ports:
      - '8000:8000'
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 5s
      timeout: 3s
      retries: 3


  celery:
    build: .
    container_name: blog_celery
    command: make celery_run_docker
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy


  redis:
    image: redis:7-alpine
    container_name: blog_redis
    restart: unless-stopped
    volumes:
      - blog_redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 3

  flower:
    build: .
    container_name: blog_flower
    restart: unless-stopped
    command: uv run celery -A blog_project --workdir=src/django_project flower --port=5555
    ports:
      - "5555:5555"
    env_file:
      - .env.docker
    depends_on:
      - redis
      - celery




volumes:
  blog_db_data:
  blog_redis_data:
